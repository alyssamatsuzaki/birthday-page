<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Benn!</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#032840;font-family:'Rajdhani',sans-serif;overflow-x:hidden;}

/* ── TANK — full-page underwater world ── */
.tank{
  width:100%;min-height:100vh;
  position:relative;
  background:linear-gradient(180deg,#041e34 0%,#052840 20%,#04343a 50%,#032e2e 78%,#021e1e 100%);
  overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
}
.tank::before{content:'';position:absolute;inset:0;background:linear-gradient(175deg,rgba(0,120,200,0.1) 0%,transparent 40%),linear-gradient(190deg,rgba(0,180,110,0.07) 20%,transparent 55%);pointer-events:none;z-index:1;}
.shimmer{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,rgba(160,230,255,0.4),transparent);animation:shim 6s ease-in-out infinite;z-index:30;}
@keyframes shim{0%,100%{transform:translateX(-100%)}50%{transform:translateX(100%)}}
.glass-l{position:absolute;top:0;left:0;width:7px;height:100%;background:linear-gradient(90deg,rgba(160,230,255,0.1),transparent);z-index:30;pointer-events:none;}
.glass-r{position:absolute;top:0;right:0;width:7px;height:100%;background:linear-gradient(270deg,rgba(160,230,255,0.07),transparent);z-index:30;pointer-events:none;}

/* ── BIRTHDAY HEADER ── */
.hdr{
  position:relative;z-index:20;
  text-align:center;
  padding:4rem 2rem 1rem;
  animation:floatHdr 9s ease-in-out infinite alternate;
}
@keyframes floatHdr{from{transform:translateY(0)}to{transform:translateY(-6px)}}
.hdr h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2.8rem,9vw,5.8rem);
  font-weight:400;color:#d8f4ec;
  line-height:1.05;letter-spacing:0.08em;
  text-shadow:0 0 40px rgba(0,200,140,0.3),0 0 80px rgba(0,140,200,0.15),0 2px 16px rgba(0,0,0,0.6);
}
.hdr h1 em{
  font-style:normal;
  color:#3de8b8;
  text-shadow:0 0 30px rgba(0,220,180,0.45),0 0 60px rgba(0,160,200,0.2);
}
.setlist-label{
  font-family:'Orbitron',sans-serif;
  font-size:0.58rem;
  font-weight:400;
  letter-spacing:0.45em;
  text-transform:uppercase;
  color:rgba(100,220,190,0.45);
  text-align:center;
  margin:0.6rem 0 1rem;
  position:relative;z-index:20;
}

/* ── LINK CARDS ── */
.links{
  position:relative;z-index:20;
  display:flex;flex-direction:column;gap:10px;
  width:100%;max-width:420px;
  padding:0 1.4rem 1rem;
}
.lcard{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;border-radius:10px;
  text-decoration:none;border:1px solid;
  backdrop-filter:blur(8px);
  transition:transform .25s,border-color .25s;
}
.lcard:hover{transform:translateY(-2px);}
.lcard-icon{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lcard-text{flex:1;}
.lcard-title{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:1.05rem;line-height:1.2;letter-spacing:0.08em;text-transform:uppercase;}
.lcard-sub{font-size:0.55rem;letter-spacing:0.18em;text-transform:uppercase;margin-top:3px;color:rgba(160,210,190,0.28);font-family:'Orbitron',sans-serif;}
.lcard-arrow{font-size:0.85rem;opacity:.35;transition:transform .25s,opacity .25s;}
.lcard:hover .lcard-arrow{transform:translateX(3px);opacity:0.8;}

/* footer */
.ftr{position:relative;z-index:20;font-size:0.55rem;color:rgba(0,200,120,0.2);letter-spacing:0.2em;text-transform:uppercase;text-align:center;padding:0.4rem 0 1rem;}

/* ── CUSTOM PLAY / PAUSE BUTTON ── */
#play-btn{
  width:58px;height:58px;border-radius:50%;
  background:linear-gradient(135deg,#00ffaa,#00ccff);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px rgba(0,255,170,0.45),0 0 48px rgba(0,200,255,0.2);
  transition:transform .15s,box-shadow .15s;
  position:relative;z-index:21;
}
#play-btn:hover{transform:scale(1.1);box-shadow:0 0 32px rgba(0,255,170,0.65),0 0 64px rgba(0,200,255,0.3);}
#play-btn:active{transform:scale(0.96);}
#play-btn.playing{
  background:linear-gradient(135deg,#00ccff,#aa44ff);
  box-shadow:0 0 24px rgba(0,200,255,0.45),0 0 48px rgba(170,68,255,0.25);
}
#play-btn svg polygon,#play-btn svg rect{transition:fill .2s;}

/* spacer pushes aquascape scene to the bottom */
.scene-spacer{flex:1;min-height:20px;}

/* ── AQUASCAPE SCENE wrapper ── */
.aquascape{
  position:relative;
  width:100%;
  flex-shrink:0;
}

/* ── BUBBLES ── */
.bub{position:absolute;border-radius:50%;border:1px solid rgba(120,210,200,0.3);background:rgba(120,210,200,0.04);animation:br linear infinite;z-index:22;}
@keyframes br{0%{transform:translateY(0) translateX(0);opacity:0}8%{opacity:.8}88%{opacity:.22}100%{transform:translateY(-105vh) translateX(12px);opacity:0}}

/* ── FISH ── */
.fish{position:absolute;animation:swim linear infinite;z-index:21;}
@keyframes swim{
  0%  {transform:translateX(-120px)}
  49% {transform:translateX(calc(100vw + 120px))}
  50% {transform:translateX(calc(100vw + 120px)) scaleX(-1)}
  99% {transform:translateX(-120px) scaleX(-1)}
  100%{transform:translateX(-120px)}
}
.fb{animation:wig ease-in-out infinite alternate;}
@keyframes wig{from{transform:rotate(-3deg)}to{transform:rotate(3deg)}}

/* ── DJ BOOTH ── */
.booth-wrap{position:absolute;bottom:0;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;z-index:26;}
.decks-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.decks{width:160px;height:44px;background:#060a06;border:1px solid rgba(160,100,40,0.55);border-radius:4px;display:flex;align-items:center;justify-content:space-around;padding:0 8px;}
.btable{width:160px;height:14px;background:linear-gradient(180deg,#2a1a08,#1a0f04);border-radius:4px 4px 0 0;border:1px solid rgba(160,100,40,0.55);border-bottom:none;}
.vinyl{width:30px;height:30px;border-radius:50%;background:conic-gradient(#0a2a1a,#1a4a2a,#0a2a1a,#1a4a2a,#0a2a1a);border:2px solid rgba(0,200,120,0.5);animation:vsp 2s linear infinite;position:relative;}
.vinyl::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:rgba(0,255,160,0.85);}
@keyframes vsp{to{transform:rotate(360deg)}}
.fdrs{display:flex;gap:4px;align-items:flex-end;}
.fdr{width:4px;border-radius:2px;background:rgba(0,255,160,0.28);animation:fa ease-in-out infinite alternate;}
@keyframes fa{from{transform:scaleY(.35);background:rgba(0,255,160,.28)}to{transform:scaleY(1);background:rgba(0,255,160,.72)}}

/* ── LASER CANVAS ── */
#laser-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:8;pointer-events:none;}

/* ── SOUND RINGS around DJ ── */
.sound-rings{position:absolute;bottom:180px;left:50%;transform:translateX(-50%);z-index:24;pointer-events:none;width:0;height:0;}
.sring{position:absolute;border-radius:50%;border:1.5px solid;transform:translate(-50%,-50%);animation:ringPulse ease-out infinite;}
@keyframes ringPulse{
  0%  {transform:translate(-50%,-50%) scale(0.3);opacity:0.9;}
  100%{transform:translate(-50%,-50%) scale(3.5);opacity:0;}
}
/* sound wave bars (EQ style) floating near DJ */
.eq-wrap{position:absolute;bottom:245px;left:50%;transform:translateX(-50%);z-index:25;display:flex;gap:4px;align-items:flex-end;pointer-events:none;}
.eq-bar{width:5px;border-radius:3px;animation:eqBounce ease-in-out infinite alternate;}
@keyframes eqBounce{from{transform:scaleY(0.2);}to{transform:scaleY(1);}}
/* floating music note particles */
.note{position:absolute;font-size:1.1rem;z-index:25;pointer-events:none;animation:noteFloat linear infinite;color:#4dffc4;text-shadow:0 0 10px rgba(0,255,200,0.8);}
@keyframes noteFloat{
  0%  {transform:translateY(0) translateX(0) rotate(0deg);opacity:0;}
  10% {opacity:1;}
  80% {opacity:0.6;}
  100%{transform:translateY(-120px) translateX(var(--nx)) rotate(var(--nr));opacity:0;}
}

/* ── LIGHT BEAMS (kept for fallback, hidden by canvas) ── */
.beams{display:none;}
.beam{display:none;}

/* ── SVG faders animated via JS ── */
.hidden{display:none!important;}
</style>
</head>

// ══ AUDIO PLAY / PAUSE — native HTML5 ══
(function(){
  const audio = document.getElementById('sc-player');

  function setPlaying(state){
    const btn       = document.getElementById('play-btn');
    const playIcon  = document.getElementById('play-icon');
    const pauseIcon = document.getElementById('pause-icon');
    if(!btn) return;
    if(state){
      btn.classList.add('playing');
      playIcon.style.display  = 'none';
      pauseIcon.style.display = '';
    } else {
      btn.classList.remove('playing');
      playIcon.style.display  = '';
      pauseIcon.style.display = 'none';
    }
  }

  // Sync icon with audio state
  audio.addEventListener('play',  ()=> setPlaying(true));
  audio.addEventListener('pause', ()=> setPlaying(false));

  // Only the button controls playback
  window.togglePlay = function(e){
    if(e) e.stopPropagation();
    if(audio.paused){
      audio.play().then(()=>{ setPlaying(true); }).catch(()=>{});
    } else {
      audio.pause();
    }
  };
})();

// ══ LASER CANVAS ENGINE ══
(function(){
  const canvas = document.getElementById('laser-canvas');
  const ctx = canvas.getContext('2d');

  function resize(){
    canvas.width  = canvas.offsetWidth  || window.innerWidth;
    canvas.height = canvas.offsetHeight || window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Laser beam definitions — origin from DJ booth (bottom-centre)
  const LASER_COLORS = [
    '#00ffaa','#00ccff','#ff00cc','#ffee00','#aa44ff','#00ffff','#ff4488','#44ffcc'
  ];

  class Laser {
    constructor(index, total){
      this.index = index;
      this.total = total;
      this.reset();
    }
    reset(){
      this.color  = LASER_COLORS[Math.floor(Math.random() * LASER_COLORS.length)];
      this.speed  = 0.004 + Math.random() * 0.008;
      this.phase  = Math.random() * Math.PI * 2;
      this.span   = (25 + Math.random() * 55) * (Math.PI/180); // sweep range in radians
      this.base   = (-160 + (this.index / this.total) * 140) * (Math.PI/180); // spread across top
      this.length = 0.35 + Math.random() * 0.45; // fraction of screen height
      this.width  = 1.5 + Math.random() * 2;
      this.alpha  = 0.55 + Math.random() * 0.35;
      this.glowW  = this.width * 6;
    }
    draw(t){
      const W = canvas.width, H = canvas.height;
      const ox = W / 2;
      const oy = H;                               // origin: bottom-centre

      const angle = this.base + Math.sin(t * this.speed + this.phase) * this.span;
      const len   = H * this.length;
      const ex = ox + Math.sin(angle) * len;
      const ey = oy + Math.cos(angle) * len;       // cos because angle from vertical

      // outer glow
      ctx.save();
      ctx.globalAlpha = this.alpha * 0.25;
      ctx.strokeStyle = this.color;
      ctx.lineWidth   = this.glowW;
      ctx.lineCap     = 'round';
      ctx.shadowColor = this.color;
      ctx.shadowBlur  = 18;
      ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ex, ey); ctx.stroke();

      // bright core
      ctx.globalAlpha = this.alpha;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth   = this.width * 0.4;
      ctx.shadowBlur  = 6;
      ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ex, ey); ctx.stroke();

      // mid beam
      ctx.globalAlpha = this.alpha * 0.8;
      ctx.strokeStyle = this.color;
      ctx.lineWidth   = this.width;
      ctx.shadowBlur  = 14;
      ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ex, ey); ctx.stroke();

      // endpoint sparkle
      ctx.globalAlpha = this.alpha * 0.7;
      ctx.fillStyle   = '#ffffff';
      ctx.shadowBlur  = 20;
      ctx.shadowColor = this.color;
      ctx.beginPath(); ctx.arc(ex, ey, this.width * 1.8, 0, Math.PI*2); ctx.fill();

      ctx.restore();
    }
  }

  // Create 12 lasers
  const lasers = Array.from({length:12}, (_,i) => new Laser(i, 12));

  // Randomly swap a laser colour/params every 1.8s
  setInterval(()=>{
    const i = Math.floor(Math.random() * lasers.length);
    lasers[i].reset();
  }, 1800);

  let t = 0;
  function frame(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    t++;
    for(const l of lasers) l.draw(t);
    requestAnimationFrame(frame);
  }
  frame();
})();

    const col  = colors[Math.floor(Math.random()*colors.length)];
    const nx   = (Math.random()*160 - 80) + 'px';
    const nr   = (Math.random()*60 - 30)  + 'deg';
    const dur  = 2.2 + Math.random() * 2;
    const size = 0.8 + Math.random() * 0.8;
    // spawn near DJ — centre bottom
    const left = 40 + Math.random() * 20;
    const bot  = 18 + Math.random() * 8;
    el.textContent = sym;
    el.style.cssText = `
      left:${left}%;bottom:${bot}%;
      color:${col};text-shadow:0 0 12px ${col};
      font-size:${size}rem;
      --nx:${nx};--nr:${nr};
      animation-duration:${dur}s;
      animation-delay:${Math.random()*1.5}s;
    `;
    layer.appendChild(el);
    setTimeout(()=>el.remove(), (dur + 1.5) * 1000);
  }

  // Spawn a note every 380ms
  setInterval(spawnNote, 380);
  // Pre-seed a few immediately
  for(let i=0;i<6;i++) setTimeout(spawnNote, i*200);
})();



// ── VINYL SPIN via rAF ──
(function(){
  let angle = 0;
  const vL = document.getElementById('vinylL');
  const vR = document.getElementById('vinylR');
  function spin(){
    angle = (angle + 0.6) % 360;
    if(vL) vL.style.transform = `rotate(${angle}deg)`;
    if(vR) vR.style.transform = `rotate(${-angle}deg)`;
    requestAnimationFrame(spin);
  }
  spin();
})();

// ── FADER BARS via JS oscillation ──
(function(){
  const bars = ['fsvg1','fsvg2','fsvg3','fsvg4','fsvg5'];
  const maxH = [14,10,15,11,13];
  const phases = [0, 0.8, 1.6, 2.4, 3.2];
  function tick(t){
    bars.forEach((id,i)=>{
      const el = document.getElementById(id);
      if(!el) return;
      const h = 4 + (maxH[i]-4) * (0.5 + 0.5 * Math.sin(t/300 + phases[i]));
      const baseY = [96,100,95,99,97][i];
      el.setAttribute('height', h.toFixed(1));
      el.setAttribute('y', (baseY + maxH[i] - h).toFixed(1));
    });
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

}
